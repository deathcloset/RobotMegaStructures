<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Robot Mega Structures</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0e13;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        touch-action: none;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 8px;
        padding: 8px 10px;
        background: rgba(0, 0, 0, 0.55);
        color: #b8c4d0;
        font-size: 12px;
        line-height: 1.5;
        border-radius: 6px;
        white-space: pre;
        pointer-events: none;
        user-select: none;
      }
      #hint {
        position: fixed;
        bottom: 8px;
        left: 8px;
        color: #5f6b78;
        font-size: 11px;
        pointer-events: none;
      }
      #banner {
        position: fixed;
        top: 18%;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        padding: 14px 22px;
        background: rgba(224, 162, 78, 0.92);
        color: #1a1205;
        font-size: 20px;
        font-weight: 600;
        border-radius: 10px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
        pointer-events: none;
        user-select: none;
      }
      #reconnect {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        padding: 8px 14px;
        background: rgba(200, 70, 70, 0.92);
        color: #fff;
        font-size: 13px;
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        cursor: pointer;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="banner"></div>
    <div id="reconnect"></div>
    <div id="hint">
      tap a depot to grab material, then tap a ghost block to build · tap ground:
      move · drag: pan · wheel / pinch: zoom · walk far to loop around the planet 🪐
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
